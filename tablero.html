    <script>
        let variable0="0";
        let variableX="X"
        
        
            let dimensiones=parseInt(prompt("Introduce el tamaño"))

                        if(x%2==0){
                        suma=variableX+suma;
                    }
                        else{
                        suma=variable0+suma;
                    }
                    
                
                }
                console.log(suma)
                }
                else{
                    for(let x=0;x<dimensiones;x++){

                    }

                }

                }
            }
