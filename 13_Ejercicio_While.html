<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Ejercicio While</title>
</head>

<body>
    <script>
            let cuentaAtras=10;
            while(cuentaAtras!=0)
            {
                console.log(cuentaAtras)
                cuentaAtras--;
                if(cuentaAtras==0){
                    console.log(cuentaAtras)
                    console.log("Despegue!")
                }
            }
    
    </script>
</body>

</html>
